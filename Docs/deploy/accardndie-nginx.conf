# AcCardNDie - configurazione cache per la build WebGL servita da nginx.
# VPS IONOS 217.160.212.85, web root /var/www/html (dominio accardndie.com).
#
# Come applicarla:
#   1. Copiare questi blocchi DENTRO il "server { ... }" di
#      /etc/nginx/sites-available/default (o creare un include).
#   2. sudo nginx -t                # verifica sintassi
#   3. sudo systemctl reload nginx  # applica senza downtime
#
# Logica:
#   - index.html / sw.js / manifest  -> mai cache "dura": gli aggiornamenti si
#     vedono subito e il Service Worker si aggiorna appena cambi la build.
#   - Build/*  -> cache lunghissima "immutable": gli URL sono gia' versionati
#     con ?v=<Product Version>, quindi cambiano da soli quando pubblichi una
#     nuova build. ATTENZIONE: perche' i client vedano la nuova build DEVI
#     alzare la Product Version in Unity (Player Settings), altrimenti restano
#     sulla versione in cache.
#   - StreamingAssets/  -> cache media con rivalidazione.

# WASM col MIME corretto (necessario per lo streaming compilation)
types { application/wasm wasm; }

# Compressione al volo: riduce il PRIMO download (Unity compression e' disattivata).
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types application/wasm application/octet-stream application/javascript text/javascript application/json image/svg+xml text/css;

# --- HTML: sempre rivalidato ---
location = / {
    add_header Cache-Control "no-cache";
}
location = /index.html {
    add_header Cache-Control "no-cache";
}

# --- Service Worker e manifest: mai in cache dura (devono aggiornarsi) ---
location = /sw.js {
    add_header Cache-Control "no-cache";
}
location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    types { application/manifest+json webmanifest; }
    default_type application/manifest+json;
}

# --- File pesanti della build: versionati con ?v=, cache immutabile ---
location /Build/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# --- Asset del template (loader gia' versionato a parte via ?v=) ---
location /TemplateData/ {
    add_header Cache-Control "public, max-age=604800";
}

# --- StreamingAssets: rivalidazione ---
location /StreamingAssets/ {
    add_header Cache-Control "public, max-age=0, must-revalidate";
}
